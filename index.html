<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>中国当代史刷题</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Microsoft YaHei",sans-serif;background:#f5f0e8;color:#2c2416}

.opt{display:block;width:100%;padding:12px 16px;margin:6px 0;text-align:left;border:2px solid #e0d8c8;border-radius:6px;background:#fdfaf5;font-size:.95em;cursor:pointer}
.opt:hover{border-color:#8b6914}.opt.good{border-color:#27ae60;background:#eafaf1}.opt.bad{border-color:#e74c3c;background:#fdedec}.opt.done{pointer-events:none}

.empty{text-align:center;padding:60px 20px;color:#999}.back{color:#8b1a1a;background:none;border:none;cursor:pointer;margin-bottom:8px;font-size:.9em}</style></head><body><div class="c" id="app"></div><script>var Q=var Q=var Q=var Q=[{"period":"1949-1952","type":"single","question":"七届二中全会提出工作重心从农村转移到城市。但进城不到三年毛泽东就发动了三反运动。从\"进京赶考\"到\"反腐运动\"，中间最关键的一环是什么","options":["朝鲜战争爆发后军费激增导致财政纪律全面收紧","增产节约运动中发现的系统性贪污——尤其是刘青山张子善案——使毛泽东确信糖衣炮弹的","苏联要求中共参照苏共经验在干部队伍中开展大规模清洗","民主党派在政协会议上连续提出反腐败提案给中共造成政治压力"],"answer":1,"analysis":"路径：1949.3西柏坡提出两个务必→1951.10增产节约运动→发现各地严重贪污→1951.12三反发动。刘青山说：老子们拼命打了天下享受些又怎么样？毛说：正因为他们功劳大才要处决他们——只有处决他们才可能挽救二十个二百个两千个两万个干部。三反查出贪污分子120万人判刑38402人。","id":1},{"period":"1949-1952","type":"single","question":"抗美援朝决策中毛泽东说\"参战利益极大\"——但利益不只是军事上的。刘少奇后来揭示了抗美援朝与国内镇压运动之间的关系，这个关系是什么","options":["战争使美国无暇顾及台湾从而使大陆得以从容完成土地改革","抗美援朝的锣鼓响起来——土改的锣鼓镇反的锣鼓就不大听见了就好搞了——爱国主义激情为","战争消耗了过剩的青年劳动力缓解了城市就业压力","战争为中国争取到了苏联大量的无偿军事援助和经济援助"],"answer":1,"analysis":"刘少奇原话：如果没有抗美援朝的锣鼓响得那么厉害那么土改（和镇反）的锣鼓就不得了了——这里打死一个地主那里也打了一个到处闹很多事情不好办。这揭示了对外战争与对内镇压之间的政治掩护机制。1950.10.8出兵决议→10.10镇反双十指示——仅隔两天。","id":2},{"period":"1949-1952","type":"single","question":"1949年的《共同纲领》没有写\"社会主义\"——而1954年宪法明确写了。从新民主主义共和国到社会主义宪法，中间发生了什么事促使了这种转变","options":["1952年五反运动后毛泽东宣布不应再将民族资产阶级称为中间阶级——中国的主要矛盾已转变为工人","朝鲜战争的胜利使毛泽东相信社会主义制度在军事上具有优越性","苏联在1953年斯大林逝世后要求中国加快向社会主义过渡的步伐","第一届全国人民代表大会即将召开需要在宪法中明确长远发展目标"],"answer":0,"analysis":"1952.6.6毛泽东批示：不应再将民族资产阶级称为中间阶级。同年9月提出10-15年完成向社会主义的转变。1953.6.15政治局会议完整提出过渡时期总路线。1954年宪法正是在这个背景下制定的——它的任务是确认正在进行的社会主义改造。宪法序言明确写道：从中华人民共和国成立到社会主义社会建成这是一个过渡时期。","id":3},{"period":"1953-1957","type":"single","question":"苏共二十大（1956.2）后毛泽东在《论十大关系》中提出\"以苏为鉴\"——但他对赫鲁晓夫秘密报告的态度与东欧国家完全不同。中共的独特性体现在哪里","options":["全盘否定斯大林并且全面支持赫鲁晓夫的去斯大林化改革——此说法在关键事实上存在偏差","发表《关于无产阶级专政的历史经验》和《再论无产阶级专政的历史经验》——一方面承认揭盖子有积极","拒绝评论赫鲁晓夫报告认为这是苏共的党内事务中国不干涉","立即与苏联断交并在国际共运中另立山头与苏共争夺领导权"],"answer":1,"analysis":"《一论》(1956.4)指出斯大林是一个伟大的马克思列宁主义者——功大于过——他的一生是伟大的马克思列宁主义革命家的一生。《再论》(1956.12)进一步阐述了反对个人崇拜与坚持无产阶级专政的关系。两篇文章的立场：既不完全否定赫鲁晓夫也不完全拥护斯大林——这种独立姿态标志着中共开始在国际共运中发出自己的声音。同时波匈事件(1956.10)使毛更坚定了对修正主义的警惕。","id":4},{"period":"1953-1957","type":"single","question":"1957年整风鸣放中储安平提出\"党天下\"——这句话为什么触怒毛泽东的程度超过了其他所有批评","options":["储安平是国民党留用人员有特务嫌疑——此说法在关键事实上存在偏差","因为党天下直接质疑了列宁式建党原则——不是批评某个具体政策而是质疑党领导一切的合法性本身这","因为储安平在提出党天下时引用了美国政治学的理论框架","因为储安平在讲话中直接点了毛泽东的名字要求他辞去党主席职务"],"answer":1,"analysis":"储安平1957.6.1在民主党派座谈会上说党天下是一个宗派主义的组织——全国范围内不论大小单位都要安排一个党员做头儿。毛在6月8日《这是为什么》社论中作出回应。储触及的不仅是具体政策而是根本权力结构——党领导一切的体制。匈牙利事件中知识分子从批评具体问题演变到要求多党制的教训使毛对这类言论极度敏感。储后来列入五名中央级右派至死未获改正。","id":5},{"period":"1953-1957","type":"single","question":"1955年毛泽东批邓子恢\"小脚女人\"加速了合作化——但仅仅几个月前（1955年3月）国务院刚下令停止发展合作社。短短四个月间态度逆转的原因是","options":["邓子恢在党内的政治对手向毛泽东告密说他正在联合刘少奇搞派系活动","毛泽东认为统购统销需要一个统一的交粮组织——分散的个体农户无法满足国家对粮食的控制需求——合作化是统购统销的制度配套","苏联要求中国必须在1956年之前完成农业集体化以配合社会主义阵营的统一规划","1955年农业丰收使毛泽东相信农民的生产积极性已经被充分调动"],"answer":1,"analysis":"1955年春合作社从10万猛增至65万出现冒进。3月国务院下令停止发展5月政治局会议决定放慢。但毛泽东7月31日报告逆转：必须先有合作社然后才能使用大机器——否定了他自己1949年的观点。深层逻辑：统购统销(1953.11)需要一个统一的生产单位来交售粮食——分散农户不配合征购——合作化解决的是交粮问题而不仅是生产问题。陈云的两担炸药比喻指向的正是这个制度链。","id":6},{"period":"1958-1965","type":"single","question":"庐山会议上彭德怀的信说\"小资产阶级的狂热性\"——这个判断直接挑战的不是大跃进的具体做法而是更深层的一个逻辑。这个逻辑是什么","options":["挑战了计划经济本身认为市场经济更有效率——此说法在关键事实上存在偏差","挑战了\"群众运动可以创造经济奇迹\"的前提——如果承认小资产阶级狂热性就意味着大跃进不是","挑战了党对军队的绝对领导认为彭德怀作为国防部长利用军队干预党内事务","挑战了中苏同盟认为苏联的建设模式在中国根本不适用"],"answer":1,"analysis":"彭的话触及了大跃进合法性的核心：如果大跃进是\"小资产阶级狂热性\"的产物——那么它就不是社会主义制度的优越性体现而是领导人的主观错误。这意味着1958年以来的一切不是\"成绩伟大问题不少\"（毛的原话）而是方向性错误。毛7月23日说\"表现了资产阶级的动摇性\"——把对政策的批评升级为对阶级立场的质疑——因为承认批评就意味着承认错误，而承认错误在当时的政治逻辑中就是向资产阶级投降。","id":7},{"period":"1958-1965","type":"single","question":"七千人大会上刘少奇说\"三分天灾七分人祸\"——毛泽东也做了自我批评。但几个月后八届十中全会毛就重提阶级斗争。毛在短暂的\"纠左\"后选择\"反右\"的根本原因是什么","options":["刘少奇在大会上公开要求毛泽东对三年困难承担全部个人责任——此说法在关键事实上存在偏差","彭德怀1962年写了八万言申诉书要求翻案——邓子恢力推责任田——小说《刘志丹》被定性为反党——毛认为","苏联赫鲁晓夫下台后勃列日涅夫要求中国纠正大跃进的错误——此说法在关键事实上存在偏差","美国在越南升级战争使毛泽东判断国际形势发生了根本变化——此说法在关键事实上存在偏差"],"answer":1,"analysis":"七千人大会是毛同意的纠左——但批评范围超出了他的预期。1962.6彭德怀申诉书要求翻1959年案（翻案风）——邓子恢支持安徽责任田（单干风）——《刘志丹》被康生定性为利用小说反党。这三件事叠加使毛相信七千人大会打开了否定三面红旗的闸门。八届十中全会毛说\"千万不要忘了阶级斗争\"——纠左之门关闭。此后直到文革阶级斗争这根弦越绷越紧。","id":8},{"period":"1966-1976","type":"single","question":"文革中毛泽东说\"赫鲁晓夫那样的人物正睡在我们的身旁\"——这句话出自《五一六通知》指刘少奇。但从客观上看最终真的成为\"赫鲁晓夫式人物\"的是谁","options":["刘少奇——他在1968年被永远开除出党——此说法在关键事实上存在偏差","林彪——作为亲定接班人入党章却企图谋害毛泽东出逃机毁人亡——与赫鲁晓夫否定斯大","周恩来——他在文革后期批判极左思潮被毛批评为搞修正主义","邓小平——他在1975年全面整顿被毛定性为走资派还在走"],"answer":1,"analysis":"历史的反讽：毛写《五一六通知》时指刘为\"中国的赫鲁晓夫\"——结果毛最信任的林彪却被写入九大党章作为接班人后企图谋害毛出逃身亡。赫鲁晓夫的秘密报告否定斯大林——林彪的五七一工程纪要同样是通过秘密方式试图推翻最高领袖。从这个角度看文革最核心的逻辑——\"睡在身边的赫鲁晓夫\"——没有应验在刘少奇身上反而在林彪身上以最戏剧性的方式应验了。","id":9},{"period":"1966-1976","type":"single","question":"1971年九一三事件后周恩来批判极左思潮——1975年邓小平全面整顿——1976年四五运动——这三件事构成了一个什么样的逻辑链条","options":["三件事毫无关联各自由不同的人出于不同的动机分别发动","从党内高层纠左到中层干部响应再到普通群众自发表达不满——反映了一条从上层到基层不断扩大","三件事都是由毛泽东幕后策划用来测试林彪和四人帮忠诚度的","三件事代表了军队系统和文官系统之间的权力斗争与文革无关"],"answer":1,"analysis":"周恩来1972-1973借林彪事件批极左→毛泽东不允批左改为批林批孔。邓小平1975以三项指示为纲全面整顿→毛感觉文革正被系统否定发动批邓。四五运动群众悼周拥邓→被定性为反革命暴乱。但从客观效果看这三件事构成了一条越来越深入的对文革的否定——从党内高层纠左到中层干部响应再到普通群众自发表达不满。1978年十一届三中全会彻底否定文革的思想基础正是在这三次\"挫折\"中积累起来的。","id":10},{"period":"1977-1982","type":"single","question":"1978年真理标准讨论表面上是哲学问题实质上是政治问题。它挑战的不是某个人而是华国锋的政治合法性基础。这个基础是什么","options":["华国锋的合法性来自他在粉碎四人帮中的关键作用——此说法在关键事实上存在偏差","两个凡是——凡是毛主席作出的决策我们都坚决维护凡是毛主席的指示我们都始终不渝地遵循——它的","华国锋的合法性来自他是周恩来生前指定的接班人——此说法在关键事实上存在偏差","华国锋的合法性来自他正领导中国实现四个现代化的承诺"],"answer":1,"analysis":"1977.2.7两报一刊社论提出两个凡是。华国锋作为毛泽东临终前指定的接班人其权力来源完全是毛的个人信任。真理标准文章(1978.5.11光明日报胡福明撰胡耀邦组织)提出\"任何理论都要不断接受实践的检验\"——如果毛的决策和指示也要接受实践的检验那么华国锋的权力基础就被摧毁了。邓小平1977年4月致中央的信中提出\"用准确的完整的毛泽东思想来指导\"——这已经含蓄地否定了两个凡是。1978.12十一届三中全会确立解放思想实事求——标志着两个凡是时代的终结。","id":11},{"period":"1977-1982","type":"single","question":"农村改革中肥西县山南公社（包产到户）和小岗村（大包干）哪个在前——为什么后来宣传中小岗村成了旗帜而肥西反而鲜为人知","options":["小岗村比肥西更早实行了包产到户——此说法在关键事实上存在偏差","肥西县山南公社包产到户试点在先1978年秋——小岗村大包干在后1979年2月——但小岗村18个手印更具戏","两县同时试点不分先后只是小岗村宣传力度更大——此说法在关键事实上存在偏差","肥西县实际上是学小岗村的经验后才开始推行包产到户——此说法在关键事实上存在偏差"],"answer":1,"analysis":"周曰礼（安徽省委农村工作部部长）2009年接受访谈时明确说：山南称包产到户小岗村后来称大包干——实际内容和操作都一样。因为中央文件将农村的这次改革称为家庭联产承包责任制与小岗村农民的大包干更贴近一些——小岗村18个手印更具有农民的代表性——以后在全国宣传小岗村就多起来。杜润生总结：农村改革并没有一幅事先描绘好的蓝图——它是在农民基层干部地方政府和中央领导各个层次各个方面的互动过程中完成的。","id":12},{"period":"1977-1982","type":"single","question":"邓小平对傻子瓜子三次表态\"不要动\"——这个表态的深层逻辑是什么","options":["邓认为年广九的经营活动对国民经济有重大贡献——此说法在关键事实上存在偏差","邓的逻辑不是给雇工问题定性而是\"不动\"——因为一动群众就会说政策变了人心就不安了——\"看不","邓认为雇工问题应该由地方政府自行处理中央政府不应干预","邓实际上支持雇工经营只是碍于党内反对意见不便明说——此说法在关键事实上存在偏差"],"answer":1,"analysis":"邓三次表态（1980放一放看一看→1984.10.22不要动一动人们就说政策变了→1992南方谈话不能动一动了得不偿失）体现了一个核心方法论：不是急于给争议做结论而是让实践来检验。邓说让傻子瓜子经营一段怕什么伤害了社会主义吗？如果不处理就会影响大局吗？如果处理了群众说政策变了人心不安得不偿失。这种不争论先实践的思路是改革开放区别于之前三十年政治运动的关键。","id":13},{"id":14,"period":"1949-1952","type":"single","question":"新中国三大外交政策中另起炉灶和打扫干净屋子再请客各自针对什么对象","options":["针对美国和苏联采取了完全不同的外交方针","前者不承认国民党旧外交关系——后者先清除帝国主义在华特权再建交——两者主要针对西方国家但也适用于苏联","两者都是权宜之计后来被一边倒外交政策全面取代","两者都只针对美国及其盟友对社会主义国家采取不同政策"],"answer":1,"analysis":"另起炉灶:1949.1.19周恩来起草的外交指示——凡国民党承认的外交机关一概不予承认。打扫干净屋子:从1950年起收回外国兵营停止内河航运取消领事裁判权教会推行自治自养自传。注意苏联也是打扫干净后才请进来的客只不过先进来一步。"},{"id":15,"period":"1949-1952","type":"single","question":"镇反运动毛泽东说千载难逢——1951年5月为何又下令收缩","options":["利用全国土改完成后的社会稳定局面适时结束了运动","各地杀人数目攀升超出预期——毛警觉后说右倾比左倾好丧失社会同情丧失劳动力","苏联方面向中国施压要求停止大规模镇压行动","镇压已经全部完成无需继续收缩"],"answer":1,"analysis":"1950.10.8出兵仅两天后发双十指示。1951年5月各地数字惊人。毛4月20日致电各中央局说西南已达千分之一个别地方超过了。5月公安会议明确要求控制在中央要求内收缩。公安部统计:逮捕262万处决71.2万。"},{"id":16,"period":"1949-1952","type":"single","question":"三反和五反在内容和对象上有什么根本区别","options":["两者内容完全相同只是先后在不同阶段推行不同名称","三反在党政军内部反贪污反浪费反官僚主义——五反针对违法资产阶级反行贿偷税漏税盗骗偷工减料盗窃经济情报","三反在城市进行五反在农村进行——三反对象是工人五反对象是农民","三反主要针对经济问题五反主要针对政治思想问题"],"answer":1,"analysis":"三反(1951.12-1952.10):反贪污反浪费反官僚主义。五反(1952.1-6):反行贿反偷税漏税反盗骗国家财产反偷工减料反盗窃经济情报。五反因三反中发现官商勾结而引发。薄一波赴沪按违法金额将资本家分五类。三反查出贪污120万人判刑38402人。"},{"id":17,"period":"1953-1957","type":"single","question":"统购统销制度最深远的社会制度性后果是什么——为什么说它奠定了城乡二元体制","options":["保障了城市居民的基本粮食供应并逐步提高了农民的收入水平","户口与粮食挂钩——1955年划分农业与非农业人口——1958年户口登记条例以法律形式固化城乡分割——农民从此失去了自由迁徙的权利","促进了城乡之间在人力物资和资金方面的自由高效双向流动","取消了过去的计划经济体制为后来的市场化改革全面铺平了道路"],"answer":1,"analysis":"制度链:统购统销→户口与粮食挂钩→1955年划分农业/非农业人口→1958年《户口登记条例》法律固化→城乡二元户籍制度。工农业剪刀差(1953-1978其间转移约六千亿至八千亿元)为工业化提供积累。陈云比喻挑着一担炸药两害相权取其轻。1993年取消粮票油票统购统销正式终结。"},{"id":18,"period":"1953-1957","type":"single","question":"1955年毛泽东批评邓子恢像小脚女人——此前两人在什么根本问题上存在分歧","options":["是否应该立即消灭农村中的富农经济和个体经营","合作化与机械化的先后次序——邓主张先工业化后集体化毛主张先有合作社后有大机器","是否应该恢复农村中的自由市场和粮食自由贸易","是否应该允许农民退社和保持自留地等家庭副业经营"],"answer":1,"analysis":"1955.7.31报告批邓子恢:过多的评头品足不适当的埋怨无穷的忧虑数不尽的清规戒律。毛提出技术改革比社会改革需更长时间必须先有合作社才能使用大机器——否定了自己1949年先工业化后集体化的观点。到1956年底87.8%入高级社。后果:此后二十多年农民人均收入基本无增长。"},{"id":19,"period":"1953-1957","type":"single","question":"苏共二十大后中共发表《关于无产阶级专政的历史经验》——这篇文章的核心立场是什么","options":["全面否定斯大林并与赫鲁晓夫的去斯大林化保持一致","一方面肯定揭盖子的积极意义一方面强调斯大林功大于过——在苏共与斯大林之间走了一条中间路线","拒绝评价斯大林认为这是苏共的内部事务","要求赫鲁晓夫撤回秘密报告并公开向斯大林道歉"],"answer":1,"analysis":"《一论》(1956.4):斯大林是一个伟大的马克思列宁主义者功大于过。《再论》(1956.12)进一步阐述反对个人崇拜与坚持无产阶级专政的关系。两篇文章标志着中共开始在国际共运中发出独立于苏共的声音。同时波匈事件(1956.10)使毛泽东更警惕修正主义。"},{"id":20,"period":"1953-1957","type":"single","question":"1957年整风鸣放中民主党派和知识分子提出了大量批评——毛称反右为阳谋。阳谋策略的核心是什么","options":["公开动员群众批判右派分子让他们在人民面前暴露","暗中决定引蛇出洞——公开场合继续鼓励鸣放但内部已确定这些言论是向党进攻——等到右派充分暴露后集中反击","通过人民来信和举报收集右派罪证后再统一抓捕","与民主党派领导人秘密协商要求他们主动交出右派名单"],"answer":1,"analysis":"整风(1957.4.27)原定为反主观主义宗派主义官僚主义。鸣放中储安平党天下章伯钧政治设计院罗隆基平反委员会等言论超出预期。5月中旬中央发514和516指示:放手发表暂不批驳使右翼暴露。6月8日《人民日报》社论+党内指示同时发出。毛7月1日称这是阳谋不是阴谋。共划右派552877人。"},{"id":21,"period":"1958-1965","type":"single","question":"三面红旗指总路线大跃进和人民公社——总路线在哪次会议上正式通过","options":["1958年1月南宁会议","1958年5月八大二次会议","1958年3月成都会议","1958年8月北戴河会议"],"answer":1,"analysis":"八大二次会议(1958.5.5-23)正式通过鼓足干劲力争上游多快好省地建设社会主义的总路线。此前南宁会议(1月)和成都会议(3月)做了思想准备——毛在这两次会上严厉批判了1956年的反冒进。8月北戴河后一个月全国公社化。"},{"id":22,"period":"1966-1976","type":"single","question":"文革发动前夕彭罗陆杨被打倒——四人分别控制了什么关键部门","options":["彭控制外交罗控制军队陆控制经济杨控制党务","彭控制北京市委罗控制军队总参陆控制宣传系统杨控制中央办公厅","彭控制公安罗控制财政陆控制教育杨控制统战","彭控制上海罗控制空军陆控制文化杨控制人事"],"answer":1,"analysis":"1966年5月23日中央政治局扩大会议撤销彭真(北京市委第一书记)罗瑞卿(中央军委秘书长)陆定一(中宣部部长)杨尚昆(中央办公厅主任)一切职务。分别控制了北京市军队总参宣传系统和中央办公厅——是抵制文革发动的最大组织障碍。同日通过《五一六通知》重新设立以陈伯达为组长的中央文革小组。"},{"id":23,"period":"1966-1976","type":"single","question":"上海一月风暴后全国各省市自治区成立了什么新的权力机构","options":["各级人民代表会议取代了原来的党委和人民政府","革命委员会——实行党政一元化领导取代了原有的党委和政府","军管会——由各大军区派出军事代表全面接管地方政权","中央文革联络站——由中央文革小组直接派员掌控地方权力"],"answer":1,"analysis":"1967年1月上海造反派在张春桥姚文元支持下夺权。此后全国各省市自治区掀起全面夺权浪潮。至1968年9月全国29个省市区全部成立革命委员会实行一元化领导。夺权过程中各地武斗升级1967年夏季达到高潮。1967年2月谭震林陈毅叶剑英等在怀仁堂与中央文革发生冲突(二月抗争)被毛压制。"},{"id":24,"period":"1966-1976","type":"single","question":"九一三事件后周恩来主持批极左——但毛泽东为什么改为批林批孔","options":["毛认为极左已经被纠正应该转向批右","毛担心批左会否定文革——林彪事件后批左的逻辑延伸必然指向文革本身——批林批孔将林彪定性为极右而非极左维护了文革的正当性","周恩来请求毛改变方向因为批左遭到四人帮抵制","林彪生前的日记显示他是孔子的崇拜者"],"answer":1,"analysis":"周恩来1972-1973借林彪事件批判极左思潮恢复国民经济落实干部政策。但毛认为批左会系统否定文革——1974年发动批林批孔运动将林彪定性为借孔孟之道搞资本主义复辟的极右分子。四人帮借机攻击周恩来为当代大儒。毛1974年7月批评江青不要搞四人帮但他也不允许从政治上彻底否定文革。"},{"id":25,"period":"1977-1982","type":"single","question":"十一届三中全会被认为是改革开放起点——全会在组织路线上做了什么调整","options":["选举胡耀邦为中央主席取代了华国锋","形成以邓小平为核心的中央领导集体——陈云当选中央纪委第一书记邓颖超胡耀邦王震进入政治局","恢复刘少奇的名誉并追认为革命烈士","通过了审判四人帮的正式决议并成立了特别法庭"],"answer":1,"analysis":"全会形成了以邓小平为核心的第二代中央领导集体。陈云当选中央纪委第一书记提出执政党的党风问题是有关党的生死存亡的问题。邓颖超胡耀邦王震等进入政治局。华国锋在会上做了自我批评。全会在思想上政治上组织上全面恢复了马克思主义的正确路线。"},{"id":26,"period":"1977-1982","type":"single","question":"小岗村按手印的大包干做法与肥西县山南公社的包产到户有什么本质区别","options":["两者完全相同只是叫法不同","包产到户保留生产队统一核算分配——包干到户彻底取消生产队分配直接按人包地——后者对农民激励更直接透明","包产到户是安徽模式包干到户是四川模式","包产到户将土地所有权分给农户包干到户仅承包经营权"],"answer":1,"analysis":"大包干歌:大包干大包干直来直去不拐弯保证国家的留足集体的其余都是自己的。包产到户仍由生产队统一核算按承包产量计算工分——农民说包产到户是算出来的是干部说了算。包干到户彻底取消生产队控制权农民利益直接透明——1983年全国95%以上实行包干到户。"},{"id":27,"period":"1977-1982","type":"single","question":"1981年《关于建国以来党的若干历史问题的决议》对毛泽东和文革做了怎样的权威评价","options":["全盘否定毛泽东认定其晚年错误已经超过了历史功绩","肯定毛泽东功绩第一错误第二——彻底否定文革定义为由领导者错误发动被反革命集团利用给党和国家带来严重灾难的内乱","完全肯定毛泽东和文革坚持无产阶级专政下继续革命的理论","回避对毛泽东的评价仅总结经济建设的经验和教训"],"answer":1,"analysis":"邓小平主持起草多次谈话定调:确立毛泽东历史地位坚持和发展毛泽东思想;对建国三十年来大事进行实事求是的分析;对过去的事情做个基本总结。决议指出:毛泽东发动文革的主要论点脱离了毛泽东思想的轨道。决议标志着中共在指导思想上完成了拨乱反正。"},{"id":28,"period":"1977-1982","type":"single","question":"邓小平南巡讲话(1992)中计划与市场都是手段的判断有什么突破性意义","options":["确认了中国将继续坚持计划经济的主体地位不动摇","打破了计划与市场属于社会制度属性的传统观念——计划多一点还是市场多一点不是社会主义与资本主义的本质区别——为十四大确立社会主义市场经济体制提供了理论基础","宣布中国放弃社会主义道路全面转向市场经济","否定了1978年以来改革开放的基本方针主张回到计划经济"],"answer":1,"analysis":"南巡讲话(1992.1-2武昌深圳珠海上海):基本路线要管一百年;判断标准三个有利于;发展才是硬道理;中国要警惕右但主要是防止左。南巡打破1989年后改革停滞局面——同年10月十四大确立社会主义市场经济体制目标。"},{"id":29,"period":"1977-1982","type":"single","question":"经济特区从出口特区更名是在哪一年——围绕特区的租界之争反了映什么","options":["1984年——争论反映了中央内部的权力斗争","1980年——争论反映了改革开放初期来自意识形态的巨大阻力——有人将特区比作旧中国租界的复辟","1978年——争论主要集中在经济领域不涉及政治","1982年——争论主要是因为特区发展速度过快引起了担忧"],"answer":1,"analysis":"1979.7中发50号文件设出口特区。1980.5更名经济特区。8.26全国人大常委会批准。1982年两省座谈会将走私贩私问题政治化——胡乔木在会上插话强调要警惕旧中国租界的由来——附件《旧中国租界的由来》发全国。1984年邓南巡:不是收而是放——特区是个窗口。"},{"id":30,"period":"1958-1965","type":"single","question":"八字方针调整巩固充实提高是在哪次会议上正式提出——调整作为核心具体体现在哪些措施","options":["七千人大会——主要调整了政治路线和意识形态方针","1961年1月八届九中全会——压缩基建投资从384亿降至123亿降低钢指标精减城镇人口约2600万恢复自留地解散公共食堂","庐山会议——主要调整了军事部署和国防战略","北戴河会议——主要调整了对外关系和对苏方针"],"answer":1,"analysis":"1961年1月八届九中全会通过。调整是核心:压缩基建降低工业指标精减城镇人口恢复农业生产。1965年国民经济恢复至1957年水平但人民生活仍低。政治上的纠左未能同步——1962年9月八届十中全会后重提阶级斗争调整被中断。"}];;;;var labels="ABCDEFGH";var state={view:"home",filter:"all",queue:[],idx:0};var app=document.getElementById("app");

app.innerHTML='<button class="back" onclick="home()">← 返回</button>'+
'<div class="card"><small style="color:#999">'+n+'/'+t+' · '+q.period+'</small>'+

q.options.map(function(o,i){return '<button class="opt" id="o'+i+'" onclick="answer('+qid+','+i+')">'+labels[i]+'. '+o+'</button>'}).join('')+
'<div class="ana" id="ana"></div><button class="next" id="nxt" onclick="next()">下一题 →</button></div>';

}
function answer(qid,ua){
var q=Q.find(function(x){return x.id===qid});if(!q)return;var ok=ua===q.answer;
document.querySelectorAll(".opt").forEach(function(b){b.classList.add("done")});
document.getElementById("o"+q.answer).classList.add("good");
if(!ok){document.getElementById("o"+ua).classList.add("bad");var w=W();if(w.indexOf(qid)<0){w.unshift(qid);Sw(w)}}
var p=P();p.t++;if(ok)p.c++;Sp(p);
document.getElementById("ana").innerHTML='<b>'+(ok?'✓ 正确':'✗ 错误')+'</b> 答案: <b>'+labels[q.answer]+'. '+q.options[q.answer]+'</b><br><br>'+(q.analysis||'');
document.getElementById("ana").classList.add("on");document.getElementById("nxt").classList.add("on");
}
function next(){state.idx++;quiz()}
function wrong(){
var w=W();if(w.length===0){app.innerHTML='<button class="back" onclick="home()">← 返回</button><div class="empty">暂无错题</div>';return}
var h='<button class="back" onclick="home()">← 返回</button><h2>错题本('+w.length+'题)</h2>';
w.forEach(function(qid){var q=Q.find(function(x){return x.id===qid});if(!q)return;
h+='<div class="card"><b>#'+q.id+'</b> '+q.question+'<br><span style="color:#1e7e34">答案: '+labels[q.answer]+'. '+q.options[q.answer]+'</span><div class="ana on" style="margin-top:8px">'+(q.analysis||'')+'</div></div>';
});app.innerHTML=h;
}
function browse(){

var pn={"1949-1952":"建国初期","1953-1957":"过渡时期","1958-1965":"大跃进与调整","1966-1976":"文化大革命","1977-1982":"改革开放初期"};
var h='<button class="back" onclick="home()">← 返回</button><h2>题库大览('+Q.length+'题)</h2>';
ps.forEach(function(p){var qs=Q.filter(function(q){return q.period===p});if(qs.length===0)return;
h+='<h3 style="color:#8b1a1a;margin:16px 0 8px">'+pn[p]+' · '+qs.length+'题</h3>';
qs.forEach(function(q){h+='<div class="card" style="cursor:pointer" onclick="var el=this.querySelector(\'div\');el.style.display=el.style.display==\'block\'?\'none\':\'block\'"><b>#'+q.id+'</b> '+q.question+'<div style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #eee"><b style="color:#1e7e34">'+labels[q.answer]+'. '+q.options[q.answer]+'</b><br>'+(q.analysis||'')+'</div></div>'});
});app.innerHTML=h;
}home();</script></body></html>
