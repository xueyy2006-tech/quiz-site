.back{color:#8b1a1a;background:none;border:none;cursor:pointer;margin-bottom:8px;font-size:.9em}</style></head><body><div class="c" id="app"></div><script>var Q=[{"period":"1949-1952","type":"single","question":"中共七届二中全会(1949.3)提出党的工作重心如何转移——毛泽东在会上特别警告了什么危险","options":["从军事斗争转向经济建设——警告帝国主义武装干涉","从农村转移到城市——警告糖衣炮弹对干部的腐蚀","从政治运动转向生产建设——警告苏联修正主义影响","从武装斗争转向议会斗争——警告国民党反攻大陆"],"answer":1,"analysis":"七届二中全会(1949.3.5-13西柏坡)决定将党的工作重心从农村转移到城市。毛泽东警告:可能有这样一些共产党人,他们不曾被拿枪的敌人征服过,但经不起糖衣裹着...","id":111},{"period":"1949-1952","type":"single","question":"《共同纲领》(1949.9.29)确立的国家性质和经济方针分别是什么","options":["社会主义国家——以重工业为中心优先发展","新民主主义国家——公私兼顾劳资两利城乡互助内外交流","无产阶级专政国家——全盘国有化消灭私营经济","人民民主主义国家——农业为基础工业为主导"],"answer":1,"analysis":"《共同纲领》规定:中华人民共和国为新民主主义即人民民主主义的国家,实行工人阶级领导的以工农联盟为基础的团结各民主阶级和国内各民族的人民民主专政。经济方针:四面八...","id":112},{"period":"1949-1952","type":"single","question":"毛泽东首次提出人民民主专政概念是在什么时候——这一概念后来通过什么文件上升为国家制度","options":["1945年中共七大——《论联合政府》将其确立","1948年9月西柏坡会议——后写入《共同纲领》和1954年宪法","1949年3月七届二中全会——后写入《论十大关系》","1949年6月政协筹备会——后写入1950年《土地改革法》"],"answer":1,"analysis":"1948年9月毛泽东在西柏坡政治局会议上首次使用人民民主专政代替工农民主专政。1949年6月《论人民民主专政》系统阐述:对人民内部民主,对反动派专政。1949年...","id":113},{"period":"1949-1952","type":"single","question":"重庆谈判(1945.8-10)达成《双十协定》后毛泽东如何评价国民党的变化","options":["毛泽东认为蒋介石彻底放弃了独裁统治的野心","毛泽东说现在是有蒋以来从未有之弱——兵散了新闻检查取消了","毛泽东说国民党已经接受了联合政府的所有政治条件","毛泽东称重庆谈判是中国走向民主宪政的伟大转折点"],"answer":1,"analysis":"毛泽东评价:现在是有蒋以来从未有之弱——兵散了,新闻检查取消了,这是18年来未有之事。指1927年国共分裂以来国民党首次被迫做出实质性政治让步。但蒋介石始终认为...","id":114},{"period":"1949-1952","type":"single","question":"三大战役(1948.9-1949.1)的时间顺序和歼敌总数是多少","options":["淮海-辽沈-平津,歼敌约80万人","辽沈-淮海-平津,歼敌约154万余人","平津-辽沈-淮海,歼敌约100万人","辽沈-平津-淮海,歼敌约200万人"],"answer":1,"analysis":"三大战役:辽沈(1948.9.12-11.2)解放东北;淮海(1948.11.6-1949.1.10)歼敌55.5万;平津(1948.11.29-1949.1....","id":115},{"period":"1949-1952","type":"single","question":"新中国三大外交政策中打扫干净屋子再请客的具体措施不包括哪项","options":["取消外国人在华的海关管理权和内河航运权","收回外国在北京天津上海等地的兵营和军事设施","彻底废除一切不平等条约并取消外国领事裁判权","立即与所有资本主义国家断绝一切外交和经贸关系"],"answer":3,"analysis":"打扫干净屋子再请客的具体措施:取消海关管理权、
