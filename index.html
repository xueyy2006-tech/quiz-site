<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国当代史 · 选择题题库 (1949-1982)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f0e8;color:#2c2416;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 20px 30px}
.header h1{font-size:1.8em;color:#8b1a1a}
.header .sub{font-size:.9em;color:#8b6914}
.header .stats{margin-top:12px;font-size:.85em;color:#666}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.btn{display:block;width:100%;padding:16px 24px;margin:10px 0;border:none;border-radius:10px;font-size:1.02em;cursor:pointer;text-align:center;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.btn-primary{background:#8b1a1a;color:#fff}
.btn-outline{background:#fff;color:#8b1a1a;border:2px solid #8b1a1a}
.btn-browse{background:#fff;color:#5a4a2a;border:2px solid #8b6914}
.badge{display:inline-block;background:#e74c3c;color:#fff;border-radius:12px;padding:2px 10px;font-size:.8em;margin-left:6px}
.quiz-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.progress-bar{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden;min-width:100px}
.progress-fill{height:100%;background:#8b1a1a;transition:width .3s}
.quiz-stats{font-size:.9em;color:#666}
.period-select{padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:.9em}
.q-card{background:#fff;border-radius:12px;padding:28px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-num{font-size:.85em;color:#999;margin-bottom:8px}
.q-text{font-size:1.15em;line-height:1.7;margin-bottom:20px}
.opt-btn{display:block;width:100%;padding:14px 18px;margin:8px 0;text-align:left;border:2px solid #e0d8c8;border-radius:8px;background:#fdfaf5;font-size:1em;cursor:pointer;transition:all .2s}
.opt-btn:hover:not(.done){border-color:#8b6914;background:#fef9ef}
.opt-btn.correct{border-color:#27ae60;background:#eafaf1;color:#1e7e34}
.opt-btn.wrong{border-color:#e74c3c;background:#fdedec;color:#b03a2e}
.opt-btn.show-correct{border-color:#27ae60}
.opt-btn.done{pointer-events:none}
.analysis-box{margin-top:16px;padding:16px;background:#fef9ef;border-left:4px solid #8b6914;border-radius:6px;font-size:.95em;line-height:1.7;display:none}
.analysis-box.show{display:block}
.next-btn{margin-top:12px;padding:12px 28px;background:#8b1a1a;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer;display:none}
.next-btn.show{display:inline-block}
.wrong-item{background:#fff;border-radius:10px;padding:18px;margin:12px 0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.wrong-analysis{font-size:.9em;padding:10px;background:#fef9ef;border-radius:6px;margin-top:8px;line-height:1.6}
.empty-state{text-align:center;padding:60px 20px;color:#999;font-size:1.1em}
.nav-back{display:inline-block;padding:8px 16px;color:#8b1a1a;cursor:pointer;font-size:.9em;margin-bottom:12px}
.key-hints{text-align:center;font-size:.8em;color:#aaa;margin-top:8px}
.hidden{display:none}
@media(max-width:600px){.header h1{font-size:1.4em}.q-text{font-size:1.05em}.opt-btn{padding:12px 14px;font-size:.95em}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
let QUESTIONS = [];
async function loadQuestions(){
  try{
    const r=await fetch('questions.js');
    const t=await r.text();
    QUESTIONS=JSON.parse(t.replace(/^window\.QUESTIONS\s*=\s*/,'').replace(/;\s*$/,''));
  }catch(e){
    console.error('Load failed',e);
    try{
      const r2=await fetch('questions_data.json');
      QUESTIONS=await r2.json();
    }catch(e2){QUESTIONS=[]}
  }
}

const STORE={
  getWrongList(){try{return JSON.parse(localStorage.getItem('cq_wrong')||'[]')}catch(e){return[]}},
  setWrongList(l){localStorage.setItem('cq_wrong',JSON.stringify(l))},
  addWrong(qid){const l=this.getWrongList();if(!l.includes(qid)){l.unshift(qid);this.setWrongList(l)}},
  removeWrong(qid){this.setWrongList(this.getWrongList().filter(id=>id!==qid))},
  getProgress(){try{return JSON.parse(localStorage.getItem('cq_progress')||'{"total":0,"correct":0}')}catch(e){return{total:0,correct:0}}},
  setProgress(p){localStorage.setItem('cq_progress',JSON.stringify(p))},
  recordAnswer(correct){const p=this.getProgress();p.total++;if(correct)p.correct++;this.setProgress(p)}
};

let state={view:'home',quizFilter:'all',quizQueue:[],quizIndex:0,_orderShuffled:null};
const app=document.getElementById('app');
const labels=['A','B','C','D','E','F','G','H'];

function render(){
  switch(state.view){
    case'home':renderHome();break;
    case'quiz':renderQuiz();break;
    case'wrong':renderWrong();break;
    case'browse':renderBrowse();break;
  }
}

function renderHome(){
  const p=STORE.getProgress();
  const wc=STORE.getWrongList().length;
  const rate=p.total>0?Math.round(p.correct/p.total*100):'-';
  app.innerHTML=`<div class="header"><h1>中国当代史 · 选择题题库</h1><div class="sub">1949—1982 · 单选 · 多选 · 排序 | 覆盖建国初期至改革开放</div><div class="stats">已刷${p.total}题 | 正确率${rate}% | 错题${wc}道 | 共${QUESTIONS.length}题</div></div>
    <div class="card">
      <button class="btn btn-primary" onclick="startQuiz('all')">开始刷题（全部类型混合）</button>
      <button class="btn btn-outline" onclick="startQuiz('1949-1952')">1949-1952 建国初期</button>
      <button class="btn btn-outline" onclick="startQuiz('1953-1957')">1953-1957 过渡时期</button>
      <button class="btn btn-outline" onclick="startQuiz('1958-1965')">1958-1965 大跃进与调整</button>
      <button class="btn btn-outline" onclick="startQuiz('1966-1976')">1966-1976 文化大革命</button>
      <button class="btn btn-outline" onclick="startQuiz('1977-1982')">1977-1982 改革开放初期</button>
      <button class="btn btn-browse" onclick="showView('wrong')">错题本<span class="badge">${wc}</span></button>
      <button class="btn btn-browse" onclick="showView('browse')">题库大览</button>
    </div>`;
}

function startQuiz(filter){
  state.quizFilter=filter;
  let pool=QUESTIONS;
  if(filter!=='all')pool=pool.filter(q=>q.period===filter);
  state.quizQueue=pool.map(q=>q.id).sort(()=>Math.random()-0.5);
  state.quizIndex=0;
  state.view='quiz';
  render();
}

function renderQuiz(){
  if(state.quizQueue.length===0){app.innerHTML='<div class="empty-state">暂无题目</div>';return}
  if(state.quizIndex>=state.quizQueue.length){
    const p=STORE.getProgress();
    app.innerHTML=`<div class="card" style="text-align:center"><h2>完成!</h2><p style="font-size:1.2em;margin:16px 0">正确率:${p.total>0?Math.round(p.correct/p.total*100):0}%</p><button class="btn btn-primary" onclick="startQuiz(state.quizFilter)">再来一轮</button><button class="btn btn-outline" onclick="showView('wrong')">错题本</button><button class="btn btn-browse" onclick="showView('home')">主页</button></div>`;
    return;
  }
  const qid=state.quizQueue[state.quizIndex];
  const q=QUESTIONS.find(x=>x.id===qid);
  if(!q){state.quizIndex++;render();return}
  const qtype=q.type||'single';
  const total=state.quizQueue.length;
  const cur=state.quizIndex+1;
  const p=STORE.getProgress();
  const rate=p.total>0?Math.round(p.correct/p.total*100):'-';
  const tLabel=qtype==='multi'?'【多选题】':(qtype==='order'?'【排序题】':'');

  let optHTML='';
  if(qtype==='order'){
    const shuffled=[...q.items].map((item,i)=>({item,orig:i})).sort(()=>Math.random()-0.5);
    state._orderShuffled=shuffled;
    optHTML=shuffled.map((s,i)=>`<div style="display:flex;align-items:center;margin:6px 0;gap:10px"><span style="font-weight:bold;min-width:20px">${i+1}.</span><span style="flex:1;padding:10px;background:#fdfaf5;border:1px solid #e0d8c8;border-radius:6px">${s.item}</span></div>`).join('');
  }else if(qtype==='multi'){
    optHTML=q.options.map((opt,i)=>`<label class="opt-btn" id="opt-${i}" style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" id="chk-${i}" style="width:18px;height:18px"><span>${labels[i]}. ${opt}</span></label>`).join('')+'<button class="btn btn-primary" style="margin-top:12px" onclick="answerQuizMulti('+qid+')">确认提交</button>';
  }else{
    optHTML=q.options.map((opt,i)=>`<button class="opt-btn" id="opt-${i}" onclick="answerQuiz(${qid},${i})">${labels[i]}. ${opt}</button>`).join('');
  }

  app.innerHTML=`<div class="nav-back" onclick="showView('home')">← 返回主页</div>
    <div class="quiz-header"><div class="progress-bar"><div class="progress-fill" style="width:${cur/total*100}%"></div></div><div class="quiz-stats">${cur}/${total} | ${rate}%</div><select class="period-select" onchange="startQuiz(this.value)"><option value="all" ${state.quizFilter==='all'?'selected':''}>全部</option><option value="1949-1952" ${state.quizFilter==='1949-1952'?'selected':''}>1949-1952</option><option value="1953-1957" ${state.quizFilter==='1953-1957'?'selected':''}>1953-1957</option><option value="1958-1965" ${state.quizFilter==='1958-1965'?'selected':''}>1958-1965</option><option value="1966-1976" ${state.quizFilter==='1966-1976'?'selected':''}>1966-1976</option><option value="1977-1982" ${state.quizFilter==='1977-1982'?'selected':''}>1977-1982</option></select></div>
    <div class="q-card"><div class="q-num">${cur} · ${tLabel} · ${q.period}</div><div class="q-text">${q.question}</div><div id="options">${optHTML}</div><div class="analysis-box" id="analysis"></div><button class="next-btn" id="next-btn" onclick="nextQuiz()">下一题 →</button></div>
    <div class="key-hints">${qtype==='single'?'键盘 A/B/C/D 选择 | → 下一题':(qtype==='multi'?'勾选正确答案后点确认':'查看排序结果后点确认')}</div>`;

  if(qtype==='order'&&!document.getElementById('order-confirm')){
    const btn=document.createElement('button');
    btn.id='order-confirm';btn.className='btn btn-primary';btn.style.marginTop='12px';btn.textContent='确认顺序';
    btn.onclick=()=>answerQuizOrder(qid);
    document.getElementById('options').appendChild(btn);
  }
  document.onkeydown=function(e){
    if(state.view!=='quiz')return;
    if(qtype==='single'){
      const k=e.key.toUpperCase();
      if(['A','B','C','D'].includes(k)){
        const idx=labels.indexOf(k);
        const btn=document.getElementById('opt-'+idx);
        if(btn&&!btn.classList.contains('done'))answerQuiz(qid,idx);
      }
    }
    if(e.key==='ArrowRight')nextQuiz();
  };
}

function answerQuiz(qid,ua){
  const q=QUESTIONS.find(x=>x.id===qid);if(!q)return;
  const correct=ua===q.answer;
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.add('done'));
  document.getElementById('opt-'+q.answer).classList.add('correct');
  if(!correct){document.getElementById('opt-'+ua).classList.add('wrong');STORE.addWrong(qid)}
  STORE.recordAnswer(correct);
  const a=document.getElementById('analysis');
  a.innerHTML=`<strong>${correct?'✓ 正确！':'✗ 错误'}</strong><br>正确答案: <strong>${labels[q.answer]}. ${q.options[q.answer]}</strong><br><br>${q.analysis}`;
  a.classList.add('show');document.getElementById('next-btn').classList.add('show');
}

function answerQuizMulti(qid){
  const q=QUESTIONS.find(x=>x.id===qid);if(!q)return;
  if(typeof q.answer==='number')q.answer=[q.answer];
  const selected=[];
  q.options.forEach((_,i)=>{if(document.getElementById('chk-'+i).checked)selected.push(i)});
  const correctSet=new Set(q.answer);
  const userSet=new Set(selected);
  const allCorrect=correctSet.size===userSet.size&&[...correctSet].every(x=>userSet.has(x));
  // Highlight
  q.options.forEach((_,i)=>{
    const el=document.getElementById('opt-'+i);el.classList.add('done');
    if(correctSet.has(i))el.classList.add('correct');
    if(userSet.has(i)&&!correctSet.has(i))el.classList.add('wrong');
  });
  if(!allCorrect)STORE.addWrong(qid);
  STORE.recordAnswer(allCorrect);
  const a=document.getElementById('analysis');
  const correctLabels=q.answer.map(i=>labels[i]+'. '+q.options[i]).join('；');
  a.innerHTML=`<strong>${allCorrect?'✓ 正确！':'✗ 错误'}</strong><br>正确答案: <strong>${correctLabels}</strong><br><br>${q.analysis}`;
  a.classList.add('show');document.getElementById('next-btn').classList.add('show');
}

function answerQuizOrder(qid){
  const q=QUESTIONS.find(x=>x.id===qid);if(!q)return;
  const sh=state._orderShuffled;
  // User order is just the display order (1,2,3...)
  const userOrder=sh.map(s=>s.orig);
  const correctOrder=q.answer; // indices of correct order
  const allCorrect=JSON.stringify(userOrder)===JSON.stringify(correctOrder);
  // Highlight
  const optsDiv=document.getElementById('options');
  const items=optsDiv.querySelectorAll('div[style]');
  items.forEach((div,i)=>{
    if(userOrder[i]===correctOrder[i])div.style.background='#eafaf1';
    else div.style.background='#fdedec';
  });
  if(!allCorrect)STORE.addWrong(qid);
  STORE.recordAnswer(allCorrect);
  const a=document.getElementById('analysis');
  a.innerHTML=`<strong>${allCorrect?'✓ 正确！':'✗ 错误'}</strong><br>正确顺序: <strong>${correctOrder.map(i=>q.items[i]).join(' → ')}</strong><br><br>${q.analysis}`;
  a.classList.add('show');document.getElementById('next-btn').classList.add('show');
  const btn=document.getElementById('order-confirm');if(btn)btn.style.display='none';
}

function nextQuiz(){state.quizIndex++;render()}

function renderWrong(){
  const ids=STORE.getWrongList();
  if(ids.length===0){app.innerHTML='<div class="nav-back" onclick="showView(\'home\')">← 返回主页</div><div class="empty-state">暂无错题，继续保持！</div>';return}
  let h='<div class="nav-back" onclick="showView(\'home\')">← 返回主页</div><div class="card"><h2>错题本 ('+ids.length+'题)</h2></div>';
  ids.forEach(qid=>{
    const q=QUESTIONS.find(x=>x.id===qid);if(!q)return;
    const qtype=q.type||'single';
    let ansStr='';
    if(qtype==='order')ansStr=q.answer.map(i=>q.items[i]).join(' → ');
    else if(Array.isArray(q.answer))ansStr=q.answer.map(i=>labels[i]+'. '+q.options[i]).join('；');
    else ansStr=labels[q.answer]+'. '+q.options[q.answer];
    h+=`<div class="wrong-item"><strong>#${q.id} [${q.period}] ${qtype==='multi'?'[多选]':(qtype==='order'?'[排序]':'')}</strong> ${q.question}<br><span style="color:#1e7e34">答案: ${ansStr}</span><div class="wrong-analysis">${q.analysis}</div></div>`;
  });
  app.innerHTML=h;
}

function renderBrowse(){
  const perNames={'1949-1952':'建国初期','1953-1957':'过渡时期','1958-1965':'大跃进与调整','1966-1976':'文化大革命','1977-1982':'改革开放初期'};
  let h='<div class="nav-back" onclick="showView(\'home\')">← 返回主页</div><div class="card"><h2>题库大览</h2><input class="search-box" placeholder="搜索题目关键词..." oninput="searchBrowse(this.value)"><p style="color:#999">共'+QUESTIONS.length+'题 点击题目展开</p></div>';
  ['1949-1952','1953-1957','1958-1965','1966-1976','1977-1982'].forEach(p=>{
    const qs=QUESTIONS.filter(q=>q.period===p);if(qs.length===0)return;
    h+=`<div class="period-section"><h3 style="color:#8b1a1a;margin:12px 0">${perNames[p]} · ${qs.length}题</h3>`;
    qs.forEach(q=>{
      const qtype=q.type||'single';let ansStr='';
      if(qtype==='order')ansStr=q.answer.map(i=>q.items[i]).join(' → ');
      else if(Array.isArray(q.answer))ansStr=q.answer.map(i=>labels[i]+'. '+q.options[i]).join('；');
      else ansStr=labels[q.answer]+'. '+q.options[q.answer];
      h+=`<div class="browse-q" data-text="${q.question}" onclick="this.querySelector('.q-answer').classList.toggle('show')"><span>#${q.id} ${qtype==='multi'?'[多选]':(qtype==='order'?'[排序]':'')}</span> ${q.question}<div class="q-answer" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #eee"><strong style="color:#1e7e34">答案: ${ansStr}</strong><br>${q.analysis}</div></div>`;
    });
  });
  app.innerHTML=h;
}

function searchBrowse(kw){
  document.querySelectorAll('.browse-q').forEach(el=>{
    el.style.display=(!kw||el.getAttribute('data-text').toLowerCase().includes(kw.toLowerCase()))?'':'none';
  });
}

function showView(v){state.view=v;render()}
async function init(){await loadQuestions();console.log(QUESTIONS.length+' questions loaded');render()}
init();
</script>
</body>
</html>
